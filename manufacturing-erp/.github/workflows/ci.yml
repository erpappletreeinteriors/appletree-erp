name: CI

on:
  push:
    branches: [main]
    paths:
      - 'manufacturing-erp/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'manufacturing-erp/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: manufacturing-erp

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appletree
          POSTGRES_PASSWORD: appletree_ci_password
          POSTGRES_DB: appletree_manufacturing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appletree"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://appletree:appletree_ci_password@localhost:5432/appletree_manufacturing_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: manufacturing-erp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=apps/backend

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend

      - name: Run backend unit tests
        run: npm run test --workspace=apps/backend -- --ci --coverage

      - name: Run backend e2e tests
        run: npm run test:e2e --workspace=apps/backend

      - name: Run frontend tests
        run: npm run test --workspace=apps/frontend
