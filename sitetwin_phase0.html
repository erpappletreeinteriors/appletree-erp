<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteTwin — Offline Site Survey (Phase 0) · Appletree Interiors</title>
<style>
:root{
  --ink:#1C1C1A; --ink-soft:#4A4842;
  --paper:#F8F7F4; --paper-raised:#FFFFFF;
  --line:#E4E1D6; --line-soft:#EFEDE4;
  --muted:#7A776C;
  --gold:#C3B152; --gold-l:#D4C47A; --gold-pale:#F4F1DC; --gold-dim:#9A8A3A;
  --olive:#9D9A91;
  --good:#3E7A5C; --good-soft:#DCEBE2;
  --warn:#B5872E; --warn-soft:#F3E8CE;
  --risk:#B14C3C; --risk-soft:#F5E0DB;
  --shadow: 0 1px 2px rgba(28,28,26,.06), 0 8px 24px -12px rgba(28,28,26,.18);
  --sans:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono: ui-monospace,"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme: dark){
  :root{
    --ink:#EDEBE2; --ink-soft:#C7C4B8;
    --paper:#1A1A17; --paper-raised:#232320;
    --line:#39372E; --line-soft:#2B2A24;
    --muted:#9C9888;
    --gold:#D9C868; --gold-l:#E6D98F; --gold-pale:#2E2A17; --gold-dim:#B7A64A;
    --olive:#A9A69C;
    --good:#7FBF9C; --good-soft:#1E3128;
    --warn:#E0B65C; --warn-soft:#332A15;
    --risk:#E08B7A; --risk-soft:#3A211D;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  line-height:1.5; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--sans);font-weight:800;color:var(--ink);margin:0;}
p{margin:0 0 8px;}
button,input,select,textarea{font-family:var(--sans);font-size:13px;color:var(--ink);}
input,select,textarea{
  padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--paper);
  width:100%;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-pale);}
button{cursor:pointer;border:none;background:none;}
textarea{resize:vertical;min-height:60px;}

/* App shell */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{
  width:290px;flex:0 0 290px;background:var(--paper-raised);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-brand{padding:16px 18px 14px;border-bottom:1px solid var(--line);}
.sidebar-brand img{height:24px;width:auto;display:block;margin-bottom:8px;}
.sidebar-brand .title{font-size:15px;font-weight:800;letter-spacing:.02em;color:var(--ink);}
.sidebar-brand .sub{font-size:11px;color:var(--gold-dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.sidebar-tree{flex:1;overflow-y:auto;padding:12px;}
.sidebar-footer{padding:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px;}
.sidebar-footer .save-status{font-size:11px;color:var(--muted);text-align:center;margin-bottom:2px;}

.add-row-inline{display:flex;gap:6px;margin-bottom:10px;}
.add-row-inline.sm{margin:6px 0 8px;}
.add-row-inline input{font-size:12.5px;padding:6px 8px;}
.btn-add-sm{background:var(--gold-pale);color:var(--gold-dim);border:1px solid var(--gold-l)!important;border-radius:6px;padding:0 10px;font-size:12px;font-weight:700;white-space:nowrap;}

.tree-row{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink-soft);margin-bottom:1px;}
.tree-row:hover{background:var(--line-soft);}
.tree-row.active{background:var(--gold-pale);color:var(--gold-dim);font-weight:700;}
.tree-row .tree-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tree-del{opacity:0;color:var(--risk);font-size:13px;padding:2px 4px;font-weight:700;}
.tree-row:hover .tree-del{opacity:1;}
.tree-children{padding-left:10px;border-left:2px solid var(--line);margin:2px 0 8px 10px;}
.tree-empty{font-size:12px;color:var(--muted);padding:8px 9px;font-style:italic;}

/* Workspace */
.workspace{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:16px 28px;border-bottom:1px solid var(--line);background:var(--paper-raised);
}
.breadcrumb{font-size:13.5px;color:var(--muted);}
.breadcrumb b{color:var(--ink);}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}

.tab-bar{display:flex;gap:2px;flex-wrap:wrap;padding:10px 24px 0;background:var(--paper-raised);border-bottom:1px solid var(--line);}
.tab-btn{padding:9px 13px;border-radius:8px 8px 0 0;background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;border:1px solid transparent;}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{background:var(--paper);border-color:var(--line);border-bottom-color:var(--paper);color:var(--gold-dim);position:relative;top:1px;}

.content-scroll{flex:1;overflow-y:auto;padding:26px clamp(16px,3vw,44px) 70px;}

/* Sections */
.section-block{background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:20px;box-shadow:var(--shadow);}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.section-head h3{font-size:16px;}
.count-badge{background:var(--gold-pale);color:var(--gold-dim);font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;}
.hint{font-size:12.5px;color:var(--muted);margin-bottom:14px;max-width:70ch;}

.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);}

.table-wrap{overflow-x:auto;margin-bottom:12px;}
.editor-table{width:100%;border-collapse:collapse;min-width:560px;}
.editor-table th{background:var(--line-soft);color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;padding:7px 8px;text-align:left;white-space:nowrap;}
.editor-table td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
.editor-table input,.editor-table select{min-width:96px;font-size:12.5px;padding:5px 7px;}
.editor-table td:last-child{width:34px;text-align:center;}
.icon-btn{color:var(--risk);font-weight:800;font-size:14px;padding:4px 6px;border-radius:5px;}
.icon-btn:hover{background:var(--risk-soft);}
.btn-add{background:var(--gold-pale);color:var(--gold-dim);border:1px solid var(--gold-l);padding:8px 14px;border-radius:7px;font-weight:700;font-size:12.5px;}

.btn-primary{background:var(--gold);color:#1C1C1A;padding:10px 18px;border-radius:8px;font-weight:800;font-size:13px;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-secondary{background:var(--paper);border:1px solid var(--line);padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;color:var(--ink);}
.btn-secondary:hover{border-color:var(--gold-l);}

.callout{padding:12px 16px;border-left:3px solid var(--gold);background:var(--gold-pale);border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:var(--ink-soft);}
.callout ul{margin:6px 0 0;padding-left:18px;}
.callout.good{border-color:var(--good);background:var(--good-soft);}
.callout.warn{border-color:var(--warn);background:var(--warn-soft);}
.callout.danger{border-color:var(--risk);background:var(--risk-soft);}
.callout b{color:var(--ink);}

.photo-checklist{list-style:none;margin:0;padding:0;columns:2;gap:24px;}
.photo-checklist li{margin-bottom:8px;break-inside:avoid;}
.photo-checklist label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
.photo-checklist input[type=checkbox]{width:auto;accent-color:var(--gold-dim);}

.sketch-toolbar{display:flex;gap:8px;margin-bottom:10px;}
.btn-tool{background:var(--paper);border:1px solid var(--line);padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:700;color:var(--ink-soft);}
.btn-tool.active{background:var(--gold-pale);color:var(--gold-dim);border-color:var(--gold-l);}
#sketchCanvas{border:1px solid var(--line);border-radius:8px;background:#fff;touch-action:none;max-width:100%;display:block;}

.plan-wrap{display:flex;justify-content:center;padding:10px 0;}
.plan-svg{background:var(--paper);border-radius:8px;}
.mark-door{fill:var(--gold-dim);}
.mark-window{fill:var(--good);}
.mark-elec{fill:var(--risk);}
.plan-legend{display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:12px;color:var(--muted);}
.plan-legend .lg{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
.lg.door{background:var(--gold-dim);} .lg.window{background:var(--good);} .lg.elec{background:var(--risk);}
.elev-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.elev-btn{background:var(--paper);border:1px solid var(--line);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;color:var(--muted);}
.elev-btn.active{background:var(--gold-pale);color:var(--gold-dim);border-color:var(--gold-l);}
.elev-label{font-family:var(--sans);font-size:9px;fill:var(--ink-soft);}

.welcome{max-width:640px;margin:40px auto;text-align:center;}
.welcome h2{font-size:22px;margin-bottom:10px;}
.welcome p{color:var(--muted);font-size:14px;}

.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
.status-pill.validated{background:var(--good-soft);color:var(--good);}
.status-pill.progress{background:var(--warn-soft);color:var(--warn);}

@media(max-width:900px){
  .sidebar{position:fixed;z-index:20;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow);}
  .field-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
}

#errorBanner{
  display:none; position:fixed; top:0; left:0; right:0; z-index:999;
  background:var(--risk-soft); color:var(--risk); border-bottom:2px solid var(--risk);
  padding:12px 20px; font-size:13px; font-family:var(--sans);
}
#errorBanner b{display:block;margin-bottom:2px;}
#errorBanner button{background:var(--risk);color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;margin-left:12px;}
</style>
</head>
<body>

<div id="errorBanner"><b>Something went wrong.</b><span id="errorBannerMsg"></span><button onclick="document.getElementById('errorBanner').style.display='none'">Dismiss</button></div>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="Appletree Interiors">
      <div class="title">SiteTwin <span style="color:var(--gold-dim)">· Phase 0</span></div>
      <div class="sub">Offline site survey — no cloud, no login</div>
    </div>
    <div class="sidebar-tree" id="sidebarTree"></div>
    <div class="sidebar-footer">
      <div class="save-status" id="saveStatus">Not saved yet</div>
      <button class="btn-secondary" id="btnExportAll">⬇ Export All Data (JSON)</button>
      <button class="btn-secondary" id="btnImportAll">⬆ Import Data (JSON)</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>
  </nav>

  <main class="workspace">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="tab-bar" id="tabBar" style="display:none"></div>
    <div class="content-scroll">
      <div id="content"></div>
    </div>
  </main>
</div>

<script>
(function(){
"use strict";

window.addEventListener("error", function(e){ showErrorBanner((e && e.message) || "Unknown error"); });
function showErrorBanner(msg){
  var b = document.getElementById("errorBanner");
  var m = document.getElementById("errorBannerMsg");
  if(!b || !m) return;
  m.textContent = " " + msg + " — your data up to this point is still saved. Try reloading the page; if it keeps happening, export your data (JSON) as a backup and let the developer know what you were doing when this appeared.";
  b.style.display = "block";
}

var STORE_KEY = "sitetwin_phase0_db_v1";
var TABS = [
  {id:"info", label:"Info"},
  {id:"walls", label:"Walls"},
  {id:"openings", label:"Doors & Windows"},
  {id:"electrical", label:"Electrical"},
  {id:"lighting", label:"Lighting"},
  {id:"hvac", label:"HVAC & Appliances"},
  {id:"plumbing", label:"Plumbing"},
  {id:"photos", label:"Photos"},
  {id:"sketch", label:"Sketch"},
  {id:"refplan", label:"Reference Plan"},
  {id:"validation", label:"Validation"},
  {id:"plan", label:"Plan & Elevation"},
  {id:"export", label:"Export"}
];

var ROOM_TYPES = ["Living Room","Master Bedroom","Bedroom","Kitchen","Dining","Bathroom","Powder Room","Utility","Balcony","Foyer / Entrance","Study / Office","Puja Room","Store Room","Other"];

var SCHEMAS = {
  walls: {
    title:"Walls", addLabel:"+ Add Wall",
    fields:[
      {key:"wallCode",label:"Wall",type:"text",placeholder:"e.g. North"},
      {key:"length_mm",label:"Length (mm)",type:"number"},
      {key:"height_mm",label:"Height (mm)",type:"number"},
      {key:"turnAngle_deg",label:"Turn to next wall (°)",type:"number",placeholder:"90"},
      {key:"beam",label:"Beam",type:"text",placeholder:"position/size"},
      {key:"column",label:"Column",type:"text",placeholder:"position/size"},
      {key:"niche",label:"Niche",type:"text",placeholder:"position/size"},
      {key:"projection_mm",label:"Projection (mm)",type:"number"},
      {key:"finish",label:"Finish",type:"text"}
    ]
  },
  doors: {
    title:"Doors", addLabel:"+ Add Door",
    fields:[
      {key:"wallCode",label:"Wall",type:"wallSelect"},
      {key:"width_mm",label:"Width (mm)",type:"number"},
      {key:"height_mm",label:"Height (mm)",type:"number"},
      {key:"swing",label:"Swing",type:"select",options:["In-Left","In-Right","Out-Left","Out-Right","Sliding"]},
      {key:"distFromCorner_mm",label:"Dist. from corner (mm)",type:"number"}
    ]
  },
  windows: {
    title:"Windows", addLabel:"+ Add Window",
    fields:[
      {key:"wallCode",label:"Wall",type:"wallSelect"},
      {key:"width_mm",label:"Width (mm)",type:"number"},
      {key:"height_mm",label:"Height (mm)",type:"number"},
      {key:"sillHeight_mm",label:"Sill height (mm)",type:"number"},
      {key:"distFromCorner_mm",label:"Dist. from corner (mm)",type:"number"}
    ]
  },
  switchboards: {
    title:"Switchboards", addLabel:"+ Add Switchboard",
    fields:[
      {key:"wallCode",label:"Wall",type:"wallSelect"},
      {key:"distFromCorner_mm",label:"Dist. from corner (mm)",type:"number"},
      {key:"height_mm",label:"Height (mm)",type:"number"},
      {key:"modules",label:"Modules",type:"number"},
      {key:"purpose",label:"Purpose",type:"text"}
    ]
  },
  sockets: {
    title:"Socket Points", addLabel:"+ Add Socket",
    fields:[
      {key:"type",label:"Type",type:"select",options:["6A","16A","UPS","USB","Appliance"]},
      {key:"wallCode",label:"Wall",type:"wallSelect"},
      {key:"distFromCorner_mm",label:"Dist. from corner (mm)",type:"number"},
      {key:"height_mm",label:"Height (mm)",type:"number"}
    ]
  },
  lights: {
    title:"Light Points", addLabel:"+ Add Light Point",
    fields:[
      {key:"type",label:"Type",type:"select",options:["Ceiling Light","Wall Light","Pendant Light","Cove Light","Strip Light","Mirror Light","Outdoor Light"]},
      {key:"wallCode",label:"Wall (if applicable)",type:"wallSelect",optional:true},
      {key:"height_mm",label:"Mounting height (mm)",type:"number"},
      {key:"switchboardNote",label:"Switchboard / circuit",type:"text"}
    ]
  },
  hvac: {
    title:"HVAC & Appliance Points", addLabel:"+ Add Point",
    fields:[
      {key:"type",label:"Type",type:"select",options:["AC Indoor Unit","AC Outdoor Unit","TV Point","Internet Point","CCTV Point","Speaker Point","Refrigerator Point","Washing Machine Point","Dishwasher Point","Chimney Point","Water Purifier Point"]},
      {key:"wallCode",label:"Wall (if applicable)",type:"wallSelect",optional:true},
      {key:"note",label:"Notes",type:"text"}
    ]
  },
  plumbing: {
    title:"Plumbing Points", addLabel:"+ Add Point",
    fields:[
      {key:"type",label:"Type",type:"select",options:["Basin","Sink","WC","Shower","Mixer","Diverter","Drain","Floor Trap","Water Inlet","Water Outlet"]},
      {key:"wallCode",label:"Wall (if applicable)",type:"wallSelect",optional:true},
      {key:"note",label:"Notes",type:"text"}
    ]
  }
};

/* ---------- storage ---------- */
var db = loadDB();
migrateDB(db);
var state = {projectId:null, floorId:null, roomId:null, tab:"info", elevIdx:0};
var saveTimer = null;

function loadDB(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {projects:[]};
}
function migrateDB(d){
  (d.projects||[]).forEach(function(p){
    (p.floors||[]).forEach(function(f){
      (f.rooms||[]).forEach(function(r){
        if(r.shape===undefined) r.shape = "rectangular";
        if(!r.referencePlan) r.referencePlan = {dataUrl:"", fileType:"", fileName:"", annotations:[]};
      });
    });
  });
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    var el = document.getElementById("saveStatus");
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify(db));
      if(el) el.textContent = "Saved on this device · " + new Date().toLocaleTimeString();
    }catch(e){
      if(el) el.textContent = "⚠ Save failed — storage may be full. Export a backup.";
    }
  }, 450);
}

/* ---------- factories ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function newProject(name){ return {id:uid(), name:name||"Untitled Project", clientName:"", address:"", createdAt:new Date().toISOString(), floors:[]}; }
function newFloor(name){ return {id:uid(), name:name||"Ground Floor", rooms:[]}; }
function newRoom(name){
  return {
    id:uid(), name:name||"New Room", roomType:"", status:"in_progress", shape:"rectangular",
    length_mm:"", width_mm:"", height_mm:"", diagonalA_mm:"", diagonalB_mm:"", wallThickness_mm:"", falseCeilingHeight_mm:"",
    notes:"",
    walls:[], doors:[], windows:[], switchboards:[], sockets:[], lights:[], hvac:[], plumbing:[],
    photos:[], sketchDataUrl:"",
    referencePlan:{dataUrl:"", fileType:"", fileName:"", annotations:[]}
  };
}

/* ---------- helpers ---------- */
function escapeHtml(v){
  return String(v===undefined||v===null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getProject(){ return db.projects.find(function(p){return p.id===state.projectId;}); }
function getFloor(){ var p=getProject(); if(!p) return null; return p.floors.find(function(f){return f.id===state.floorId;}); }
function getRoom(){ var f=getFloor(); if(!f) return null; return f.rooms.find(function(r){return r.id===state.roomId;}); }

/* ---------- validation engine ---------- */
function getPhotoChecklist(room){
  var required = ["Complete room view","Ceiling","Floor","Doors","Windows","Electrical points","Plumbing points","Special details"];
  room.walls.forEach(function(w,i){ required.push("Wall: " + (w.wallCode || ("Wall " + (i+1)))); });
  var existing = {};
  room.photos.forEach(function(p){ existing[p.label]=p; });
  var list = required.map(function(label){ return existing[label] || {label:label, captured:false}; });
  room.photos = list;
  return room.photos;
}
function validateRoom(room){
  var flags = [];
  function add(sev,msg){ flags.push({severity:sev,message:msg}); }
  if(!room.name) add("blocking","Room name is required.");
  if(!room.roomType) add("blocking","Room type is required.");
  if(!room.length_mm) add("blocking","Room length is required.");
  if(!room.width_mm) add("blocking","Room width is required.");
  if(!room.height_mm) add("blocking","Room ceiling height is required.");
  room.walls.forEach(function(w,i){ if(!w.length_mm) add("blocking","Wall #"+(i+1)+" (" + (w.wallCode||"unnamed") + ") is missing a length."); });
  room.doors.forEach(function(d,i){ if(!d.width_mm || !d.height_mm) add("blocking","Door #"+(i+1)+" is missing width/height."); });
  room.windows.forEach(function(w,i){ if(!w.width_mm || !w.height_mm) add("blocking","Window #"+(i+1)+" is missing width/height."); });

  if(room.length_mm && room.width_mm && room.diagonalA_mm){
    var computed = Math.sqrt(Math.pow(Number(room.length_mm),2)+Math.pow(Number(room.width_mm),2));
    var delta = Math.abs(computed-Number(room.diagonalA_mm))/computed;
    if(delta>0.01) add("warning","Diagonal mismatch: measured "+room.diagonalA_mm+"mm vs computed "+computed.toFixed(0)+"mm (Δ"+(delta*100).toFixed(1)+"%). Re-check or confirm irregular room.");
  }
  if(room.falseCeilingHeight_mm && room.height_mm && Number(room.falseCeilingHeight_mm) >= Number(room.height_mm)){
    add("blocking","False ceiling height must be less than the ceiling height.");
  }
  room.switchboards.forEach(function(s,i){
    if(s.height_mm && (Number(s.height_mm)<300 || Number(s.height_mm)>1400)) add("warning","Switchboard #"+(i+1)+" height "+s.height_mm+"mm is outside the typical 300–1400mm range — confirm intentional.");
  });
  room.sockets.forEach(function(s,i){
    if(s.height_mm && (Number(s.height_mm)<300 || Number(s.height_mm)>1400)) add("warning","Socket #"+(i+1)+" ("+(s.type||"—")+") height "+s.height_mm+"mm is outside the typical 300–1400mm range.");
  });
  var seen = {};
  room.sockets.forEach(function(s,i){
    if(!s.wallCode) return;
    var key = s.wallCode+"|"+s.distFromCorner_mm+"|"+s.height_mm;
    if(seen[key]!==undefined) add("warning","Possible duplicate socket at "+s.wallCode+", "+s.distFromCorner_mm+"mm from corner, height "+s.height_mm+"mm.");
    seen[key]=i;
  });
  room.doors.forEach(function(d,i){
    if(!d.wallCode) return;
    var wall = room.walls.find(function(w){ return (w.wallCode||"")===d.wallCode; });
    if(wall && wall.height_mm && d.height_mm && Number(d.height_mm) > Number(wall.height_mm)) add("blocking","Door #"+(i+1)+" height exceeds its wall's height.");
  });

  if(room.shape==="irregular" && room.walls.length>=3){
    var walk = walkPolygon(room);
    if(walk.complete && walk.closureGap>50){
      add("warning","Traced wall shape does not close: gap of "+Math.round(walk.closureGap)+"mm between the last wall's end and the first wall's start. Check wall lengths and turn angles.");
    }
  }

  var checklist = getPhotoChecklist(room);
  var missing = checklist.filter(function(p){ return !p.captured; });
  if(missing.length) add("blocking", missing.length + " required photo(s) not yet marked captured.");

  return flags;
}
/* ---------- polygon walk (irregular rooms) ---------- */
function walkPolygon(room){
  var heading = 0, x = 0, y = 0, complete = true;
  var points = [{x:x,y:y}];
  room.walls.forEach(function(w){
    var len = Number(w.length_mm);
    if(!len) complete = false;
    var rad = heading * Math.PI/180;
    x += (len||0)*Math.cos(rad);
    y += (len||0)*Math.sin(rad);
    points.push({x:x,y:y});
    var turn = (w.turnAngle_deg===undefined || w.turnAngle_deg==="") ? 90 : Number(w.turnAngle_deg);
    heading += turn;
  });
  var last = points[points.length-1];
  var gap = Math.sqrt(Math.pow(last.x-points[0].x,2)+Math.pow(last.y-points[0].y,2));
  return {points:points, closureGap:gap, complete:complete};
}

function renderField(room, f, value){
  value = (value===undefined||value===null) ? "" : value;
  if(f.type==="text") return '<input type="text" data-field="'+f.key+'" value="'+escapeHtml(value)+'" placeholder="'+escapeHtml(f.placeholder||"")+'">';
  if(f.type==="number") return '<input type="number" data-field="'+f.key+'" value="'+escapeHtml(value)+'">';
  if(f.type==="select"){
    var opts = '<option value="">–</option>';

    return '<select data-field="'+f.key+'">'+opts+'</select>';
  }
  if(f.type==="wallSelect"){
    var opts2 = '<option value="">'+(f.optional?"– none –":"– select –")+'</option>';
    room.walls.forEach(function(w,i){
      var code = w.wallCode || ("Wall "+(i+1));

    });
    return '<select data-field="'+f.key+'">'+opts2+'</select>';
  }
  return "";
}

function sideOf(code){
  code = (code||"").toLowerCase();
  if(code.indexOf("north")>-1 || code.indexOf("top")>-1) return "top";
  if(code.indexOf("south")>-1 || code.indexOf("bottom")>-1) return "bottom";
  if(code.indexOf("east")>-1 || code.indexOf("right")>-1) return "right";
  if(code.indexOf("west")>-1 || code.indexOf("left")>-1) return "left";
  return null;
}
function buildPlanSVG(room){
  if(room.shape==="irregular" && room.walls.length>=3) return buildIrregularPlanSVG(room);
  return buildRectPlanSVG(room);
}
function buildRectPlanSVG(room){
  var L = Number(room.length_mm)||4000, W = Number(room.width_mm)||3000;
  var maxDim = 340, scale = maxDim/Math.max(L,W);
  var w = L*scale, h = W*scale, pad = 30;
  var svg = '<svg viewBox="0 0 '+(w+pad*2)+' '+(h+pad*2)+'" width="100%" style="max-width:460px" class="plan-svg">';
  svg += '<rect x="'+pad+'" y="'+pad+'" width="'+w+'" height="'+h+'" fill="var(--paper-raised)" stroke="var(--ink)" stroke-width="3"/>';
  var unmapped = [];
  function edgeInfo(side){
    if(side==="top") return {x1:pad,y1:pad,x2:pad+w,y2:pad,len:L,horiz:true};
    if(side==="bottom") return {x1:pad,y1:pad+h,x2:pad+w,y2:pad+h,len:L,horiz:true};
    if(side==="left") return {x1:pad,y1:pad,x2:pad,y2:pad+h,len:W,horiz:false};
    if(side==="right") return {x1:pad+w,y1:pad,x2:pad+w,y2:pad+h,len:W,horiz:false};
  }
  function placeOnEdge(side, dist, itemWidth, cls, label){
    var e = edgeInfo(side); if(!e) return;
    var t = Math.min(1,(Number(dist)||0)/(e.len||1));
    var x = e.horiz ? e.x1+(e.x2-e.x1)*t : e.x1;
    var y = e.horiz ? e.y1 : e.y1+(e.y2-e.y1)*t;
    var wpx = itemWidth ? itemWidth*scale : 0;
    if(e.horiz){
      svg += '<rect x="'+x+'" y="'+(y-4)+'" width="'+Math.max(wpx,6)+'" height="8" class="'+cls+'"><title>'+label+'</title></rect>';
    }else{
      svg += '<rect x="'+(x-4)+'" y="'+y+'" width="8" height="'+Math.max(wpx,6)+'" class="'+cls+'"><title>'+label+'</title></rect>';
    }
  }
  room.doors.forEach(function(d){
    var side = sideOf(d.wallCode);
    if(side) placeOnEdge(side,d.distFromCorner_mm,d.width_mm,"mark-door","Door "+(d.width_mm||"?")+"×"+(d.height_mm||"?")+"mm");
    else if(d.wallCode) unmapped.push("Door on \""+d.wallCode+"\"");
  });
  room.windows.forEach(function(win){
    var side = sideOf(win.wallCode);
    if(side) placeOnEdge(side,win.distFromCorner_mm,win.width_mm,"mark-window","Window "+(win.width_mm||"?")+"×"+(win.height_mm||"?")+"mm");
    else if(win.wallCode) unmapped.push("Window on \""+win.wallCode+"\"");
  });
  room.switchboards.forEach(function(s){
    var side = sideOf(s.wallCode);
    if(side) placeOnEdge(side,s.distFromCorner_mm,120,"mark-elec","Switchboard");
    else if(s.wallCode) unmapped.push("Switchboard on \""+s.wallCode+"\"");
  });
  room.sockets.forEach(function(s){
    var side = sideOf(s.wallCode);
    if(side) placeOnEdge(side,s.distFromCorner_mm,60,"mark-elec","Socket "+(s.type||""));
    else if(s.wallCode) unmapped.push("Socket on \""+s.wallCode+"\"");
  });
  svg += '</svg>';
  return {svg:svg, unmapped:unmapped};
}
function buildIrregularPlanSVG(room){
  var walk = walkPolygon(room);
  var pts = walk.points;
  var xs = pts.map(function(p){return p.x;}), ys = pts.map(function(p){return p.y;});
  var minX = Math.min.apply(null,xs), maxX = Math.max.apply(null,xs);
  var minY = Math.min.apply(null,ys), maxY = Math.max.apply(null,ys);
  var spanX = Math.max(maxX-minX,1), spanY = Math.max(maxY-minY,1);
  var maxDim = 340, scale = maxDim/Math.max(spanX,spanY), pad = 30;
  function toSvg(p){ return {x:pad+(p.x-minX)*scale, y:pad+(p.y-minY)*scale}; }
  var svgPts = pts.map(toSvg);
  var w = spanX*scale, h = spanY*scale;
  var svg = '<svg viewBox="0 0 '+(w+pad*2)+' '+(h+pad*2)+'" width="100%" style="max-width:460px" class="plan-svg">';
  var pointsAttr = svgPts.slice(0, svgPts.length-1).map(function(p){ return p.x+","+p.y; }).join(" ");
  svg += '<polygon points="'+pointsAttr+'" fill="var(--paper-raised)" stroke="var(--ink)" stroke-width="3"/>';
  var unmapped = [];
  function findWallIdx(code){ return room.walls.findIndex(function(w,i){ return (w.wallCode||("Wall "+(i+1)))===code; }); }
  function placeOnWall(wallIdx, dist, itemWidth, cls, label){
    if(wallIdx<0 || wallIdx>=svgPts.length-1) return;
    var a = svgPts[wallIdx], b = svgPts[wallIdx+1];
    var wallLenMm = Number(room.walls[wallIdx].length_mm)||1;
    var t = Math.min(1,(Number(dist)||0)/wallLenMm);
    var mx = a.x+(b.x-a.x)*t, my = a.y+(b.y-a.y)*t;
    var dx = b.x-a.x, dy = b.y-a.y, len = Math.sqrt(dx*dx+dy*dy)||1;
    var half = itemWidth ? Math.max((itemWidth*scale)/2,4) : 5;
    var x1 = mx-(dx/len)*half, y1 = my-(dy/len)*half, x2 = mx+(dx/len)*half, y2 = my+(dy/len)*half;
    svg += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" class="'+cls+'" stroke-width="6"><title>'+label+'</title></line>';
  }
  room.doors.forEach(function(d){
    var idx = findWallIdx(d.wallCode);
    if(idx>-1) placeOnWall(idx,d.distFromCorner_mm,d.width_mm,"mark-door","Door "+(d.width_mm||"?")+"×"+(d.height_mm||"?")+"mm");
    else if(d.wallCode) unmapped.push("Door on \""+d.wallCode+"\"");
  });
  room.windows.forEach(function(win){
    var idx = findWallIdx(win.wallCode);
    if(idx>-1) placeOnWall(idx,win.distFromCorner_mm,win.width_mm,"mark-window","Window "+(win.width_mm||"?")+"×"+(win.height_mm||"?")+"mm");
    else if(win.wallCode) unmapped.push("Window on \""+win.wallCode+"\"");
  });
  room.switchboards.forEach(function(s){
    var idx = findWallIdx(s.wallCode);
    if(idx>-1) placeOnWall(idx,s.distFromCorner_mm,120,"mark-elec","Switchboard");
    else if(s.wallCode) unmapped.push("Switchboard on \""+s.wallCode+"\"");
  });
  room.sockets.forEach(function(s){
    var idx = findWallIdx(s.wallCode);
    if(idx>-1) placeOnWall(idx,s.distFromCorner_mm,60,"mark-elec","Socket "+(s.type||""));
    else if(s.wallCode) unmapped.push("Socket on \""+s.wallCode+"\"");
  });
  svg += '</svg>';
  var closureNote = null;
  if(walk.closureGap>50) closureNote = "This traced shape does not fully close — gap of "+Math.round(walk.closureGap)+"mm between the last wall's end and the first wall's start. Check wall lengths and turn angles in the Walls tab.";
  return {svg:svg, unmapped:unmapped, closureNote:closureNote};
}
function buildElevationSVG(room, wall){
  var len = Number(wall.length_mm)||Number(room.length_mm)||4000;
  var ht = Number(wall.height_mm)||Number(room.height_mm)||2700;
  var maxW = 420, scale = maxW/len;
  var w = len*scale, h = ht*scale, pad = 20;
  var svg = '<svg viewBox="0 0 '+(w+pad*2)+' '+(h+pad*2)+'" width="100%" style="max-width:520px" class="plan-svg">';
  svg += '<rect x="'+pad+'" y="'+pad+'" width="'+w+'" height="'+h+'" fill="var(--paper-raised)" stroke="var(--ink)" stroke-width="3"/>';
  var code = wall.wallCode;
  room.doors.filter(function(d){return (d.wallCode||"")===code;}).forEach(function(d){
    var dw=(Number(d.width_mm)||800)*scale, dh=(Number(d.height_mm)||2100)*scale;
    var dx=pad+(Number(d.distFromCorner_mm)||0)*scale, dy=pad+h-dh;
    svg += '<rect x="'+dx+'" y="'+dy+'" width="'+dw+'" height="'+dh+'" class="mark-door" fill-opacity="0.25" stroke="var(--gold-dim)"/><text x="'+(dx+4)+'" y="'+(dy+14)+'" class="elev-label">Door</text>';
  });
  room.windows.filter(function(win){return (win.wallCode||"")===code;}).forEach(function(win){
    var dw=(Number(win.width_mm)||1200)*scale, dh=(Number(win.height_mm)||1200)*scale;
    var dx=pad+(Number(win.distFromCorner_mm)||0)*scale;
    var dy=pad+h-((Number(win.sillHeight_mm)||900)+(Number(win.height_mm)||1200))*scale;
    svg += '<rect x="'+dx+'" y="'+dy+'" width="'+dw+'" height="'+dh+'" class="mark-window" fill-opacity="0.25" stroke="var(--good)"/><text x="'+(dx+4)+'" y="'+(dy+14)+'" class="elev-label">Window</text>';
  });
  ["switchboards","sockets","lights"].forEach(function(key){
    room[key].filter(function(it){return (it.wallCode||"")===code;}).forEach(function(it){
      var dx=pad+(Number(it.distFromCorner_mm)||0)*scale;
      var dy=pad+h-(Number(it.height_mm)||1000)*scale;

      svg += '<circle cx="'+dx+'" cy="'+dy+'" r="6" class="mark-elec"/><text x="'+(dx+8)+'" y="'+(dy+4)+'" class="elev-label">'+escapeHtml(label)+'</text>';
    });
  });
  svg += '</svg>';
  return svg;
}
function renderPlanTab(room){

function importJSONFile(file){
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.projects)) throw new Error("bad shape");
      if(!confirm("Import "+parsed.projects.length+" project(s) from this file? They will be ADDED alongside your existing projects.")) return;
      parsed.projects.forEach(function(p){ p.id = uid(); db.projects.push(p); });
      scheduleSave();
      renderAll();
      alert("Import complete.");
    }catch(e){
      alert("Could not read this file — is it a SiteTwin export?");
    }
  };
  reader.readAsText(file);
}

/* ---------- sketch canvas ---------- */
function initSketchCanvas(room){
  var canvas = document.getElementById("sketchCanvas");
  if(!canvas) return;
  var ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(room.sketchDataUrl){
    var img = new Image();
    img.onload = function(){ ctx.drawImage(img,0,0); };
    img.src = room.sketchDataUrl;
  }
  var mode = "pen", drawing = false;
  function getPos(e){
    var r = canvas.getBoundingClientRect();
    var cx = (e.touches ? e.touches[0].clientX : e.clientX);
    var cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return [ (cx-r.left)*(canvas.width/r.width), (cy-r.top)*(canvas.height/r.height) ];
  }
  canvas.addEventListener("pointerdown", function(e){ drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p[0],p[1]); });
  canvas.addEventListener("pointermove", function(e){
    if(!drawing) return;
    var p = getPos(e);
    ctx.lineTo(p[0],p[1]);
    ctx.strokeStyle = mode==="eraser" ? "#fff" : "#1C1C1A";
    ctx.lineWidth = mode==="eraser" ? 20 : 2.2;
    ctx.lineCap = "round"; ctx.lineJoin="round";
    ctx.stroke();
  });
  window.addEventListener("pointerup", function(){ if(drawing){ drawing=false; room.sketchDataUrl = canvas.toDataURL("image/png"); scheduleSave(); } });
  var penBtn = document.getElementById("sketchPen"), eraserBtn = document.getElementById("sketchEraser"), clearBtn = document.getElementById("sketchClear");
  if(penBtn) penBtn.onclick = function(){ mode="pen"; penBtn.classList.add("active"); eraserBtn.classList.remove("active"); };
  if(eraserBtn) eraserBtn.onclick = function(){ mode="eraser"; eraserBtn.classList.add("active"); penBtn.classList.remove("active"); };
  if(clearBtn) clearBtn.onclick = function(){
    if(!confirm("Clear the sketch?")) return;
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    room.sketchDataUrl = canvas.toDataURL("image/png"); scheduleSave();
  };
}

document.addEventListener("click", function(e){
  var t = e.target;

  if(t.id==="btnAddProject"){
    var input = document.getElementById("newProjectName");
    var name = (input && input.value ? input.value.trim() : "") || ("Untitled Project " + (db.projects.length+1));

    state = {projectId:p.id, floorId:null, roomId:null, tab:"info", elevIdx:0};

  }
  if(t.id==="btnAddFloor"){
    var project = getProject(); if(!project) return;
    var input2 = document.getElementById("newFloorName");
    var name2 = (input2 && input2.value ? input2.value.trim() : "") || ("Floor " + (project.floors.length+1));
    var f = newFloor(name2);
    project.floors.push(f);
    state.floorId = f.id; state.roomId = null;
    scheduleSave(); renderAll(); return;
  }
  if(t.id==="btnAddRoom"){
    var floor2 = getFloor(); if(!floor2) return;
    var input3 = document.getElementById("newRoomName");
    var name3 = (input3 && input3.value ? input3.value.trim() : "") || ("Room " + (floor2.rooms.length+1));
    var r = newRoom(name3);
    floor2.rooms.push(r);
    state.roomId = r.id; state.tab = "info"; state.elevIdx = 0;
    scheduleSave(); renderAll(); return;
  }

  var pid = t.closest("[data-projectid]");
  if(pid && pid.dataset.projectid){ state.projectId = pid.dataset.projectid; state.floorId=null; state.roomId=null; renderAll(); return; }
  var fid = t.closest("[data-floorid]");
  if(fid && fid.dataset.floorid){ state.floorId = fid.dataset.floorid; state.roomId=null; renderAll(); return; }
  var rid = t.closest("[data-roomid]");
  if(rid && rid.dataset.roomid){ state.roomId = rid.dataset.roomid; state.tab="info"; state.elevIdx=0; renderAll(); return; }

  if(t.dataset.delproject){
    if(confirm("Delete this project and everything in it? This cannot be undone.")){
      db.projects = db.projects.filter(function(p){return p.id!==t.dataset.delproject;});
      if(state.projectId===t.dataset.delproject) state = {projectId:null,floorId:null,roomId:null,tab:"info",elevIdx:0};
      scheduleSave(); renderAll();
    }
    return;
  }
  if(t.dataset.delfloor){
    var proj = getProject();
    if(confirm("Delete this floor and all its rooms? This cannot be undone.")){
      proj.floors = proj.floors.filter(function(f){return f.id!==t.dataset.delfloor;});
      if(state.floorId===t.dataset.delfloor){ state.floorId=null; state.roomId=null; }
      scheduleSave(); renderAll();
    }
    return;
  }
  if(t.dataset.delroom){
    var fl = getFloor();
    if(confirm("Delete this room? This cannot be undone.")){
      fl.rooms = fl.rooms.filter(function(r){return r.id!==t.dataset.delroom;});
      if(state.roomId===t.dataset.delroom) state.roomId=null;
      scheduleSave(); renderAll();
    }
    return;
  }

  if(t.dataset.tab){ renderTab(t.dataset.tab); return; }
  if(t.dataset.elevidx!==undefined){ state.elevIdx = Number(t.dataset.elevidx); renderTab("plan"); return; }

  if(t.classList.contains("add-row")){
    var room2 = getRoom(); var listKey = t.dataset.list;
    room2[listKey].push({});
    scheduleSave(); renderTab(state.tab); return;
  }
  if(t.classList.contains("del-row")){
    var tr = t.closest("[data-list]");
    var room3 = getRoom(); var listKey2 = tr.dataset.list, idx = Number(tr.dataset.idx);
    room3[listKey2].splice(idx,1);
    scheduleSave(); renderTab(state.tab); return;
  }

  if(t.id==="btnMarkValidated"){
    var room4 = getRoom();
    var flags2 = validateRoom(room4);
    if(flags2.some(function(f){return f.severity==="blocking";})){ return; }
    room4.status = "validated";
    scheduleSave(); renderAll(); return;
  }
  if(t.id==="btnPrintRoom"){ printRoomReport(getProject(), getFloor(), getRoom()); return; }
  if(t.id==="btnExportProjectJSON" || t.id==="btnExportProjectJSON2"){ exportProjectJSON(getProject()); return; }
  if(t.id==="btnExportAll"){ exportAllJSON(); return; }
  if(t.id==="btnImportAll"){ document.getElementById("importFile").click(); return; }

  if(t.id==="refPlanImg"){
    var roomR = getRoom(); if(!roomR) return;
    var rect = t.getBoundingClientRect();
    var xPct = ((e.clientX-rect.left)/rect.width*100);
    var yPct = ((e.clientY-rect.top)/rect.height*100);
    var label = prompt("Label for this point (e.g. 'Switchboard', 'Door', 'AC unit'):", "");
    if(label===null || !label.trim()) return;
    var type = (prompt("Type: door / window / electrical / note", "note") || "note").toLowerCase().trim();
    if(["door","window","electrical","note"].indexOf(type)===-1) type = "note";
    roomR.referencePlan.annotations.push({x:xPct.toFixed(2), y:yPct.toFixed(2), label:label.trim(), type:type});
    scheduleSave(); renderTab("refplan"); return;
  }
  if(t.id==="btnRemoveRefPlan"){
    if(confirm("Remove the attached reference plan and all its pins?")){
      var roomRP = getRoom();
      roomRP.referencePlan = {dataUrl:"", fileType:"", fileName:"", annotations:[]};
      scheduleSave(); renderTab("refplan");
    }
    return;
  }
  if(t.id==="btnOpenRefPdf"){
    var roomPdf = getRoom();
    if(roomPdf && roomPdf.referencePlan && roomPdf.referencePlan.dataUrl) window.open(roomPdf.referencePlan.dataUrl, "_blank");
    return;
  }
  if(t.classList.contains("del-annotation")){
    var roomDel = getRoom();
    roomDel.referencePlan.annotations.splice(Number(t.dataset.annidx), 1);
    scheduleSave(); renderTab("refplan"); return;
  }
});

    var room2 = getRoom(); if(!room2) return;
    var listKey = tr.dataset.list, idx = Number(tr.dataset.idx);
    var v = t.value;
    if(t.type==="number") v = v===""?"":Number(v);
    room2[listKey][idx][t.dataset.field] = v;
    scheduleSave(); return;
  }
});
document.addEventListener("change", function(e){
  var t = e.target;
  if(t.dataset.photoidx!==undefined){
    var room = getRoom(); if(!room) return;
    var idx = Number(t.dataset.photoidx);
    room.photos[idx].captured = t.checked;
    scheduleSave(); return;
  }
  if(t.id==="refPlanFile"){
    var file = t.files[0]; if(!file) return;
    var roomRef = getRoom(); if(!roomRef) return;
    var reader = new FileReader();
    reader.onload = function(){
      roomRef.referencePlan = {
        dataUrl: reader.result,
        fileType: file.type==="application/pdf" ? "pdf" : "image",
        fileName: file.name,
        annotations: []
      };
      scheduleSave(); renderTab("refplan");
    };
    reader.readAsDataURL(file);
    t.value = "";
    return;
  }
});

try{ renderAll(); }catch(e){ showErrorBanner(e.message); }
})();
</script>
</body>
</html>
